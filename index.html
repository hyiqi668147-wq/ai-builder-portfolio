<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>黄一奇 | AI Builder 作品集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-muted: #999999;
      --accent-start: #4f46e5;
      --accent-end: #7c3aed;
      --bg-white: #ffffff;
      --bg-light: #fafafa;
      --border-color: #e5e5e5;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-primary);
      background: var(--bg-white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
    }

    section {
      padding: 80px 0;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .gradient-text {
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      z-index: 100;
      padding: 16px 0;
    }

    nav .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      font-weight: 600;
      font-size: 14px;
      color: var(--text-primary);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--text-primary);
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 80px;
    }

    .hero-content {
      max-width: 640px;
    }

    .hero-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .hero-title {
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 24px;
    }

    .hero-subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 40px;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25);
    }

    .btn-secondary {
      background: var(--bg-white);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      border-color: var(--text-primary);
    }

    .projects {
      background: var(--bg-light);
    }

    .project-card {
      background: var(--bg-white);
      border-radius: 16px;
      padding: 40px;
      border: 1px solid var(--border-color);
    }

    .project-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }

    .project-title {
      font-size: 24px;
      font-weight: 700;
    }

    .project-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 6px 12px;
      background: var(--bg-light);
      border-radius: 20px;
      color: var(--text-secondary);
    }

    .project-desc {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 32px;
    }

    .project-section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .project-tasks {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 32px;
    }
