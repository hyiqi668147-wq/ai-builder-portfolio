<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>黄一奇｜AI Builder 作品集</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #fafafa;
      color: #111;
      line-height: 1.7;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 28px 20px 80px;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 72px;
    }

    .logo {
      font-weight: 800;
      letter-spacing: -0.04em;
      font-size: 20px;
    }

    .nav-tag {
      font-size: 13px;
      color: #666;
      border: 1px solid #e5e5e5;
      padding: 6px 12px;
      border-radius: 999px;
      background: #fff;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 48px;
      align-items: center;
      margin-bottom: 96px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      color: #5b4bff;
      background: #f1efff;
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(44px, 8vw, 88px);
      line-height: 0.95;
      letter-spacing: -0.08em;
      margin-bottom: 24px;
    }

    .gradient {
      background: linear-gradient(135deg, #315df6, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 18px;
      color: #555;
      max-width: 640px;
      margin-bottom: 28px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 18px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: #111;
      color: #fff;
    }

    .btn-secondary {
      background: #fff;
      border: 1px solid #e5e5e5;
      color: #111;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .hero-card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.08);
    }

    .hero-card h2 {
      font-size: 28px;
      margin-bottom: 16px;
      letter-spacing: -0.04em;
    }

    .hero-card p {
      font-size: 15px;
      color: #666;
      margin-bottom: 18px;
    }

    .mini-list {
      display: grid;
      gap: 10px;
    }

    .mini-item {
      padding: 14px;
      border-radius: 16px;
      background: #f7f7f7;
      font-size: 14px;
      font-weight: 600;
    }

    section {
      margin-bottom: 88px;
    }

    .section-title {
      font-size: 36px;
      line-height: 1.1;
      letter-spacing: -0.06em;
      margin-bottom: 16px;
    }

    .section-desc {
      color: #666;
      font-size: 16px;
      max-width: 720px;
      margin-bottom: 28px;
    }

    .card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 26px;
      padding: 28px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.05);
    }

    .project-header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .project-title {
      font-size: 28px;
      font-weight: 850;
      letter-spacing: -0.04em;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #f1efff;
      color: #5b4bff;
      font-size: 13px;
      font-weight: 800;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .item {
      background: #fafafa;
      border: 1px solid #ededed;
      border-radius: 18px;
      padding: 18px;
    }

    .item h3 {
      font-size: 16px;
      margin-bottom: 8px;
    }

    .item p, .item li {
      color: #666;
      font-size: 14px;
    }

    ul {
      padding-left: 18px;
    }

    .timeline {
      display: grid;
      gap: 14px;
    }

    .step {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 14px;
      align-items: start;
    }

    .num {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #111;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
    }

    .step-content {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 18px;
      padding: 16px;
    }

    .step-content strong {
      display: block;
      margin-bottom: 4px;
    }
