<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>黄一奇｜AI Builder 作品集</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --paper: rgba(255, 255, 255, 0.78);
      --paper-solid: #ffffff;
      --text: #0b0d12;
      --muted: #667085;
      --line: rgba(15, 23, 42, 0.10);
      --blue: #2563eb;
      --purple: #7c3aed;
      --cyan: #06b6d4;
      --shadow: 0 30px 80px rgba(15, 23, 42, 0.10);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(124, 58, 237, 0.18), transparent 28%),
        radial-gradient(circle at 80% 5%, rgba(37, 99, 235, 0.14), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(6, 182, 212, 0.10), transparent 35%),
        var(--bg);
      line-height: 1.65;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(15, 23, 42, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, 0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, black, transparent 78%);
      z-index: -1;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .cursor-glow {
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.16), transparent 65%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: -1;
      opacity: 0.8;
      transition: opacity 0.2s ease;
    }

    .wrap {
      width: min(1160px, calc(100% - 36px));
      margin: 0 auto;
    }

    .nav {
      position: sticky;
      top: 14px;
      z-index: 10;
      margin: 18px auto 80px;
      width: min(1160px, calc(100% - 36px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 12px 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.68);
      backdrop-filter: blur(18px);
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.06);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 850;
      letter-spacing: -0.04em;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: #0b0d12;
      color: white;
      display: grid;
      place-items: center;
      font-weight: 900;
      box-shadow: 0 12px 26px rgba(0,0,0,0.18);
    }

    .nav-links {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .nav-links a {
      color: var(--muted);
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 999px;
      transition: 0.2s ease;
    }

    .nav-links a:hover {
      color: var(--text);
      background: rgba(15, 23, 42, 0.05);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 48px;
      align-items: center;
      padding-bottom: 110px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid rgba(124, 58, 237, 0.18);
      border-radius: 999px;
      color: #5b21b6;
      background: rgba(255,255,255,0.7);
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 24px;
      backdrop-filter: blur(14px);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      box-shadow: 0 0 18px rgba(124, 58, 237, 0.8);
    }

    h1 {
      font-size: clamp(54px, 8vw, 104px);
      line-height: 0.92;
      letter-spacing: -0.085em;
      margin-bottom: 28px;
      max-width: 760px;
    }

    .gradient-text {
      background: linear-gradient(135deg, #1d4ed8 0%, #7c3aed 55%, #db2777 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .lead {
      color: #475467;
      font-size: 18px;
      max-width: 660px;
      margin-bottom: 34px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      padding: 13px 18px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 850;
      border: 1px solid transparent;
      transition: 0.22s ease;
      cursor: pointer;
    }
